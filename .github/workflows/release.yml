name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号（如 0.1.1，不含 v 前缀）"
        required: false
        default: "0.1.4"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    environment: CERTIFICATE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "Inno Setup 安装失败" }

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}") {
            $v = "${{ inputs.version }}"
          } elseif ("${{ github.ref }}" -like "refs/tags/v*") {
            $v = "${{ github.ref_name }}".Substring(1)
          } else {
            $v = "0.1.4"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Verify signing secrets
        id: secrets
        shell: pwsh
        env:
          S_CERTIFICATE: ${{ secrets.CERTIFICATE }}
          S_CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          S_CODESIGN_PFX: ${{ secrets.CODESIGN_PFX }}
          S_PW: ${{ secrets.PW }}
          S_PASSWORD: ${{ secrets.PASSWORD }}
          S_PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        run: |
          $cert = $env:S_CERTIFICATE
          if ([string]::IsNullOrWhiteSpace($cert)) { $cert = $env:S_CERTIFICATE_BASE64 }
          if ([string]::IsNullOrWhiteSpace($cert)) { $cert = $env:S_CODESIGN_PFX }

          $pw = $env:S_PW
          if ([string]::IsNullOrWhiteSpace($pw)) { $pw = $env:S_PASSWORD }
          if ([string]::IsNullOrWhiteSpace($pw)) { $pw = $env:S_PFX_PASSWORD }

          Write-Host "Secret presence (length only):"
          Write-Host "  CERTIFICATE=$($env:S_CERTIFICATE.Length)"
          Write-Host "  CERTIFICATE_BASE64=$($env:S_CERTIFICATE_BASE64.Length)"
          Write-Host "  CODESIGN_PFX=$($env:S_CODESIGN_PFX.Length)"
          Write-Host "  PW=$($env:S_PW.Length)"
          Write-Host "  PASSWORD=$($env:S_PASSWORD.Length)"
          Write-Host "  PFX_PASSWORD=$($env:S_PFX_PASSWORD.Length)"

          if ([string]::IsNullOrWhiteSpace($cert) -or [string]::IsNullOrWhiteSpace($pw)) {
            throw "未检测到签名凭据。请在 Environment「CERTIFICATE」中配置 CERTIFICATE（PFX Base64）与 PW（PFX 密码）。"
          }

          "cert_len=$($cert.Length)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build signed release artifacts
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.PW }}
          S_CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          S_CODESIGN_PFX: ${{ secrets.CODESIGN_PFX }}
          S_PASSWORD: ${{ secrets.PASSWORD }}
          S_PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_BASE64)) {
            $env:CERTIFICATE_BASE64 = $env:S_CERTIFICATE_BASE64
          }
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_BASE64)) {
            $env:CERTIFICATE_BASE64 = $env:S_CODESIGN_PFX
          }
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_PASSWORD)) {
            $env:CERTIFICATE_PASSWORD = $env:S_PASSWORD
          }
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_PASSWORD)) {
            $env:CERTIFICATE_PASSWORD = $env:S_PFX_PASSWORD
          }
          ./scripts/release-build.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Remove any leftover private key
        if: always()
        shell: pwsh
        run: |
          Remove-Item -Force codesign.pfx -ErrorAction SilentlyContinue
          Remove-Item -Force installer/assets/PetitPlanetRootCA.cer -ErrorAction SilentlyContinue

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/*
          generate_release_notes: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
